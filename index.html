<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Boa Noite, Amor ❤️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

  /* Reset básico */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* Fundo gradiente suave */
  body, html {
    height: 100%;
    background: linear-gradient(135deg, #283e51, #485563);
    font-family: 'Montserrat', sans-serif;
    color: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  /* Container da mensagem */
  .container {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 40px 30px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    animation: fadeIn 2s ease forwards;
    opacity: 0;
  }

  /* Títulos e textos */
  h1 {
    font-weight: 700;
    font-size: 2.8rem;
    margin-bottom: 10px;
    color: #ffd966;
  }

  p {
    font-weight: 400;
    font-size: 1.2rem;
    margin-bottom: 25px;
    line-height: 1.5;
    color: #e0e0e0;
  }

  /* Mensagem final em destaque */
  .love {
    font-weight: 700;
    font-size: 1.5rem;
    color: #ff6f91;
    font-style: italic;
  }

  /* Animação suave */
  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }

  /* Responsividade */
  @media (max-width: 480px) {
    .container {
      padding: 30px 20px;
    }
    h1 {
      font-size: 2.2rem;
    }
    p {
      font-size: 1rem;
    }
    .love {
      font-size: 1.3rem;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Boa Noite, Amor</h1>
  <p>Espero que seu dia tenha sido incrível.<br>
  Agora é hora de descansar e recarregar as energias.</p>
  <p>Dorme bem, sonhe com coisas lindas e tenha uma noite tranquila.</p>
  <p class="love">Eu te amoo ❤️</p>
</div>

</body>
</html>
